run_name:   "NorthAtlantic_seas_comparison"
data_dir:   "data"
raw_dir:    "data/raw"
shared_dir: "data/shared"
output_dir: "output"

# Spatial extent -- named basins defined as lon/lat polygon vertices
# Each polygon should be a closed or open ring; closing vertex is added automatically.
# Iceland Basin: east of the Reykjanes Ridge, bounded by the Mid-Atlantic Ridge to the west
# Irminger Sea:  west of the Reykjanes Ridge, bounded by Greenland to the northwest
basins:
  IcelandBasin:
    polygon:
      - [-32, 57.4]
      - [-22.4, 63]
      - [-12, 63]
      - [-23, 55.7]
      - [-32, 57.4]
  IrmingerSea:
    polygon:
      - [-36.5, 57]
      - [-26, 63]
      - [-32.7, 65.2]
      - [-42.8, 59.29]
      - [-36.5, 57]
  LabradorSea:
    polygon:
      - [-50.5, 53.8]
      - [-44.5, 58.5]
      - [-52.8, 62.5]
      - [-60.4, 60.4]
      - [-50.5, 53.8]
  
  NorwegianSea:
    polygon:
      - [3, 62]
      - [8.5, 70]
      - [-8.2, 70]
      - [-11, 60.4]
      - [3, 62]

# Temporal extent
date_start: "2020-01-01"
date_end:   "2026-01-01"

# NCP parameters
ncp_time_steps: ["15 days", "20 days", "30 days"]
zeu_default:    40

# Uncertainty estimation
uncertainty: true
n_mc:        100

ncp_method: "o2_budget"

# NPP estimation (CbPM). Set to false to skip all NPP-related steps (PAR
# download, match, compute_npp, NPP plots). NCP pipeline is unaffected.
compute_npp: true
# NPP inputs — MODIS-Aqua L3m PAR resolution ('9' or '4' km)
par_resolution_km: 9
