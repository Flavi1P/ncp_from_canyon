name: argo-ncp
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python
  - python=3.12
  - snakemake>=7
  - argopy
  - pandas
  - pyyaml
  - pip:
      - scipy

  # R
  - r-base>=4.1
  - r-tidyverse
  - r-ncdf4
  - r-zoo
  - r-gsw
  - r-mgcv
  - r-data.table
  - r-seacarb
  - r-here

  # castr (MLD calculation) is not on conda -- install after creating the env:
  # Rscript -e "remotes::install_github('cassidymwagner/castr')"
